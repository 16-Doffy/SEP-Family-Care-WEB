version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: fc_api
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WEB_URL: ${WEB_URL}
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared:/app/packages/shared
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "pnpm db:generate && pnpm db:migrate && pnpm db:seed && pnpm dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: fc_web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/tailwind.config.ts:/app/apps/web/tailwind.config.ts
      - ./apps/web/postcss.config.js:/app/apps/web/postcss.config.js
      - ./apps/web/next.config.js:/app/apps/web/next.config.js
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json
      - ./packages/shared:/app/packages/shared
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_uploads:
