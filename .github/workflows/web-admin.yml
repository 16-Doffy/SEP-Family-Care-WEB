name: Web Admin CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/web/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/web-admin.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/web/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/web-admin.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-admin-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  validate:
    name: Type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check shared package
        run: pnpm --filter @family-care/shared build

      - name: Type-check web admin
        run: pnpm --filter web exec tsc --noEmit

      - name: Build web admin
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL }}
          BACKEND_API_ORIGIN: ${{ vars.BACKEND_API_ORIGIN }}
        run: pnpm --filter web build

  docker-check:
    name: Verify Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}
            BACKEND_API_ORIGIN=${{ vars.BACKEND_API_ORIGIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
