name: Web Admin CI/CD

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/web/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/web-admin.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/web/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/web-admin.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-admin-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/family-care-admin-web

jobs:
  validate:
    name: Type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check shared package
        run: pnpm --filter @family-care/shared build

      - name: Type-check web admin
        run: pnpm --filter web exec tsc --noEmit

      - name: Build web admin
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL }}
          BACKEND_API_ORIGIN: ${{ vars.BACKEND_API_ORIGIN }}
        run: pnpm --filter web build

  image:
    name: Build and publish container
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}
            BACKEND_API_ORIGIN=${{ vars.BACKEND_API_ORIGIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export immutable image reference
        id: image
        shell: bash
        run: echo "ref=${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy web admin to VPS
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read

    steps:
      - name: Deploy immutable image over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_IMAGE: ${{ needs.image.outputs.image }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DEPLOY_IMAGE,GHCR_USER,GHCR_TOKEN,APP_DIR
          script_stop: true
          script: |
            set -eu
            test -n "$APP_DIR"
            cd "$APP_DIR"
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$DEPLOY_IMAGE"
            WEB_IMAGE="$DEPLOY_IMAGE" docker compose -f docker-compose.prod.yml up -d --no-deps web
            docker image prune -f
